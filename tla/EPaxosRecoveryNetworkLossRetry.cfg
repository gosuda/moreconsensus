\* Finite: one drop, one retry epoch, at most two identical copies.
SPECIFICATION FairSpec
INVARIANT TypeOK
INVARIANT Safety
PROPERTY EventuallyCoversScenario
PROPERTY EventuallyChosenByPinnedLiveQuorum
PROPERTY CommitStable
CHECK_DEADLOCK FALSE
CONSTANTS
    Scenario = "loss_retry"
    HasCommittedConflict = FALSE
    MaxDrops = 1
    MaxDuplicates = 1
    MaxRetryEpoch = 1
    MaxCopies = 2
    LiveVoters = {1, 2, 3}
